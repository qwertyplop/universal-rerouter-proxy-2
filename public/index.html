<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Universal Rerouter</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            surface: '#111218',
            card:    '#1a1b23',
            border:  '#2a2b38',
            accent:  '#7c3aed',
            'accent-light': '#a78bfa',
          }
        }
      }
    }
  </script>
  <style>
    body { background: #111218; }
    .copy-btn { transition: all .15s; }
    .copy-btn:active { transform: scale(.96); }
    .block-card { border: 1px solid #2a2b38; transition: border-color .15s, background .15s; }
    .block-card:hover { border-color: #6b21a8; }
    /* Role colours — border + subtle role-tinted bg */
    .block-card.role-system  { border-color: #3b82f6; background: linear-gradient(135deg, rgba(59,130,246,.10), #111218 60%); }
    .block-card.role-user    { border-color: #eab308; background: linear-gradient(135deg, rgba(234,179,8,.10),  #111218 60%); }
    .block-card.role-assistant { border-color: #ef4444; background: linear-gradient(135deg, rgba(239,68,68,.10),  #111218 60%); }
    /* Position indicator (prepend/append) — prefix arrow in header, subtle corner mark */
    .position-arrow { font-size: 13px; font-weight: 700; opacity: .55; user-select: none; padding: 0 4px; }
    .block-card.position-prepend::before  { content: "↑ top";    position: absolute; right: 12px; top: 8px;  font-size: 9px; letter-spacing: .08em; color: #93c5fd; opacity: .6; text-transform: uppercase; }
    .block-card.position-append::after   { content: "↓ bottom"; position: absolute; right: 12px; top: 8px;  font-size: 9px; letter-spacing: .08em; color: #c4b5fd; opacity: .6; text-transform: uppercase; }
    .block-card { position: relative; }
    select option { background: #1a1b23; }
    textarea { resize: vertical; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #111218; }
    ::-webkit-scrollbar-thumb { background: #2a2b38; border-radius: 3px; }
    .fade-in { animation: fadeIn .2s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }
    /* Logs panel */
    .logs-backdrop { opacity: 0; pointer-events: none; transition: opacity .2s; }
    .logs-backdrop.open { opacity: 1; pointer-events: auto; }
    .logs-panel { transform: translateX(100%); transition: transform .25s ease; }
    .logs-panel.open { transform: translateX(0); }
    .logs-row { border-bottom: 1px solid #2a2b38; }
    .logs-row:hover { background: #1a1b23; }
    .logs-row.expanded { background: #1a1b23; }
    .logs-detail { background: #0d0e14; border-top: 1px solid #2a2b38; }
    .logs-json { font-family: monospace; font-size: 11px; line-height: 1.5; white-space: pre-wrap; word-break: break-all; color: #d1d5db; max-height: 320px; overflow: auto; padding: 10px; background: #0a0b10; border: 1px solid #2a2b38; border-radius: 6px; }
    .logs-empty { color: #6b7280; font-size: 12px; text-align: center; padding: 40px 20px; line-height: 1.6; }
    .logs-error-banner { background: #7f1d1d; border: 1px solid #991b1b; color: #fecaca; font-family: monospace; font-size: 11px; padding: 8px 10px; border-radius: 6px; margin-bottom: 8px; }
    .toggle-switch { position: relative; display: inline-block; width: 36px; height: 20px; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider { position: absolute; cursor: pointer; inset: 0; background-color: #2a2b38; border-radius: 20px; transition: .2s; }
    .toggle-slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: #9ca3af; border-radius: 50%; transition: .2s; }
    input:checked + .toggle-slider { background-color: #7c3aed; }
    input:checked + .toggle-slider:before { transform: translateX(16px); background-color: #fff; }
  </style>
</head>
<body class="min-h-screen text-gray-100 font-mono">

  <!-- Hidden file input for import -->
  <input type="file" id="import-file-input" accept=".json,application/json" class="hidden" onchange="handleImportFile(this)" />

  <!-- Header -->
  <header class="border-b px-6 py-4 flex items-center justify-between sticky top-0 z-10" style="background:#111218; border-color:#2a2b38;">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded-lg flex items-center justify-center" style="background:#4c1d95;">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="#a78bfa" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" />
        </svg>
      </div>
      <div>
        <h1 class="text-sm font-bold text-white tracking-wide">Universal Rerouter</h1>
        <p class="text-xs text-gray-500" data-i18n="subtitle"></p>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <!-- Lang toggle -->
      <div class="flex rounded-lg overflow-hidden text-xs font-semibold" style="border:1px solid #2a2b38;">
        <button id="lang-en" onclick="setLang('en')" class="px-2.5 py-1.5 transition-all" style="background:#7c3aed; color:#fff;">EN</button>
        <button id="lang-ru" onclick="setLang('ru')" class="px-2.5 py-1.5 transition-all" style="background:transparent; color:#9ca3af;">RU</button>
      </div>
      <button onclick="importConfig()" title="Import" class="px-3 py-1.5 rounded-lg text-xs font-semibold transition-all hover:opacity-80" style="background:#1a1b23; border:1px solid #2a2b38; color:#9ca3af;" data-i18n-title="import_btn">
        <span data-i18n="import_btn"></span>
      </button>
      <button onclick="exportConfig()" title="Export" class="px-3 py-1.5 rounded-lg text-xs font-semibold transition-all hover:opacity-80" style="background:#1a1b23; border:1px solid #2a2b38; color:#9ca3af;">
        <span data-i18n="export_btn"></span>
      </button>
      <button id="logs-btn" onclick="toggleLogsPanel()" class="px-3 py-1.5 rounded-lg text-xs font-semibold transition-all hover:opacity-80 flex items-center gap-1.5" style="background:#1a1b23; border:1px solid #2a2b38; color:#9ca3af;" data-i18n-title="logs_btn_title">
        <span class="w-1.5 h-1.5 rounded-full inline-block" id="logs-btn-dot" style="background:#4b5563;"></span>
        <span data-i18n="logs_btn"></span>
        <span id="logs-btn-count" class="text-xs px-1.5 py-0.5 rounded" style="background:#2a2b38; color:#9ca3af; display:none;">0</span>
      </button>
      <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs" style="background:#14532d; color:#86efac;">
        <span class="w-1.5 h-1.5 rounded-full inline-block" style="background:#4ade80;"></span>
        <span data-i18n="deployed"></span>
      </span>
    </div>
  </header>

  <main class="max-w-2xl mx-auto px-4 py-8 space-y-6">

    <!-- Upstream URL -->
    <section class="rounded-xl p-5 space-y-3" style="background:#1a1b23; border:1px solid #2a2b38;">
      <label class="text-xs text-gray-400 uppercase tracking-widest" data-i18n="upstream_label"></label>
      <div class="flex gap-2">
        <input
          id="upstream-url"
          type="url"
          class="flex-1 rounded-lg px-3 py-2.5 text-sm text-white placeholder-gray-600 outline-none focus:ring-2 focus:ring-accent"
          style="background:#0d0e14; border:1px solid #2a2b38;"
          data-i18n-placeholder="upstream_placeholder"
        />
        <button onclick="saveAndRefresh()" class="px-4 py-2.5 rounded-lg text-sm font-semibold text-white transition-all hover:opacity-90 active:scale-95" style="background:#7c3aed;" data-i18n="save_btn"></button>
      </div>
      <p class="text-xs text-gray-500" data-i18n-html="upstream_hint"></p>
    </section>

    <!-- Mode Selector -->
    <section class="rounded-xl p-5 space-y-4" style="background:#1a1b23; border:1px solid #2a2b38;">
      <label class="text-xs text-gray-400 uppercase tracking-widest" data-i18n="mode_label"></label>
      <div class="grid grid-cols-2 gap-3">
        <button id="tab-base" onclick="setMode('base')"
          class="rounded-lg py-3 px-4 text-sm font-semibold transition-all border border-transparent"
          style="background:#7c3aed; color:#fff;">
          ⚡ Base
        </button>
        <button id="tab-full" onclick="setMode('full')"
          class="rounded-lg py-3 px-4 text-sm font-semibold transition-all border"
          style="background:transparent; border-color:#2a2b38; color:#9ca3af;">
          🧠 Full
        </button>
      </div>

      <div id="desc-base" class="text-xs text-gray-400 leading-relaxed space-y-1">
        <p>🔒 <strong class="text-gray-300" data-i18n="base_cors_title"></strong> — <span data-i18n="base_cors_desc"></span></p>
        <p>🌍 <strong class="text-gray-300" data-i18n="base_region_title"></strong> — <span data-i18n="base_region_desc"></span></p>
        <p>🔁 <strong class="text-gray-300" data-i18n="base_forward_title"></strong> — <span data-i18n="base_forward_desc"></span></p>
      </div>

      <div id="desc-full" class="hidden text-xs text-gray-400 leading-relaxed space-y-1">
        <p>✅ <span data-i18n="full_plus"></span></p>
        <p>🧱 <strong class="text-gray-300" data-i18n="full_blocks_title"></strong> — <span data-i18n="full_blocks_desc"></span></p>
        <p>🔧 <strong class="text-gray-300" data-i18n="full_nocode_title"></strong> — <span data-i18n="full_nocode_desc"></span></p>
      </div>
    </section>

    <!-- Full Mode: Prompt Manager (hidden in Base) -->
    <section id="prompt-manager" class="hidden rounded-xl p-5 space-y-4 fade-in" style="background:#1a1b23; border:1px solid #2a2b38;">
      <div class="flex items-center justify-between">
        <label class="text-xs text-gray-400 uppercase tracking-widest" data-i18n="pm_label"></label>
      </div>

      <!-- Prepend group -->
      <div class="space-y-2">
        <div class="flex items-center justify-between">
          <p class="text-xs flex items-center gap-1.5" style="color:#93c5fd;">
            <span class="inline-block w-2 h-2 rounded-sm" style="background:#1e3a5f;"></span>
            <strong data-i18n="pm_prepend_word"></strong>
            <span class="text-gray-500" data-i18n="pm_prepend_desc_short"></span>
          </p>
          <button onclick="addBlock('prepend')" class="text-xs px-2.5 py-1 rounded-lg font-semibold transition-all hover:opacity-90" style="background:#1e3a5f; color:#93c5fd;" data-i18n="pm_add_prepend"></button>
        </div>
        <div id="blocks-prepend" class="space-y-2"></div>
      </div>

      <!-- Divider -->
      <div class="flex items-center gap-3" style="color:#2a2b38;">
        <div class="flex-1 h-px" style="background:#2a2b38;"></div>
        <span class="text-[10px] uppercase tracking-widest" style="color:#4b5563;" data-i18n="pm_divider"></span>
        <div class="flex-1 h-px" style="background:#2a2b38;"></div>
      </div>

      <!-- Append group -->
      <div class="space-y-2">
        <div class="flex items-center justify-between">
          <p class="text-xs flex items-center gap-1.5" style="color:#c4b5fd;">
            <span class="inline-block w-2 h-2 rounded-sm" style="background:#3b1f5e;"></span>
            <strong data-i18n="pm_append_word"></strong>
            <span class="text-gray-500" data-i18n="pm_append_desc_short"></span>
          </p>
          <button onclick="addBlock('append')" class="text-xs px-2.5 py-1 rounded-lg font-semibold transition-all hover:opacity-90" style="background:#3b1f5e; color:#c4b5fd;" data-i18n="pm_add_append"></button>
        </div>
        <div id="blocks-append" class="space-y-2"></div>
      </div>

      <div id="blocks-empty" class="text-center py-8 text-gray-600 text-sm">
        <span data-i18n-html="pm_empty"></span>
      </div>
    </section>

    <!-- Generated URLs -->
    <section id="urls-section" class="hidden rounded-xl p-5 space-y-4" style="background:#1a1b23; border:1px solid #2a2b38;">
      <label class="text-xs text-gray-400 uppercase tracking-widest" data-i18n="urls_label"></label>
      <p class="text-xs text-gray-500" data-i18n="urls_hint"></p>

      <div class="space-y-3">
        <div>
          <p class="text-xs text-gray-500 mb-1.5" data-i18n="urls_janitor_label"></p>
          <div class="flex gap-2 items-center">
            <code id="url-janitor" class="flex-1 text-xs px-3 py-2.5 rounded-lg truncate text-purple-300" style="background:#0d0e14; border:1px solid #2a2b38;"></code>
            <button onclick="copyUrl('url-janitor', this)" class="copy-btn px-3 py-2.5 rounded-lg text-xs font-semibold text-white" style="background:#2a2b38; min-width:64px;" data-i18n="copy_btn"></button>
          </div>
        </div>
        <div>
          <p class="text-xs text-gray-500 mb-1.5" data-i18n="urls_silly_label"></p>
          <div class="flex gap-2 items-center">
            <code id="url-silly" class="flex-1 text-xs px-3 py-2.5 rounded-lg truncate text-purple-300" style="background:#0d0e14; border:1px solid #2a2b38;"></code>
            <button onclick="copyUrl('url-silly', this)" class="copy-btn px-3 py-2.5 rounded-lg text-xs font-semibold text-white" style="background:#2a2b38; min-width:64px;" data-i18n="copy_btn"></button>
          </div>
        </div>
      </div>

      <details class="text-xs text-gray-500">
        <summary class="cursor-pointer hover:text-gray-300 transition-colors" data-i18n="setup_guide"></summary>
        <div class="mt-3 space-y-4 leading-relaxed">
          <div>
            <p class="text-gray-300 font-semibold mb-1">JanitorAI</p>
            <ol class="list-decimal list-inside space-y-1 text-gray-400" data-i18n-html="guide_janitor"></ol>
          </div>
          <div>
            <p class="text-gray-300 font-semibold mb-1">SillyTavern</p>
            <ol class="list-decimal list-inside space-y-1 text-gray-400" data-i18n-html="guide_silly"></ol>
          </div>
        </div>
      </details>
    </section>

    <!-- No URL state -->
    <section id="no-url-notice" class="rounded-xl p-5 text-center text-sm text-gray-500" style="background:#1a1b23; border:1px dashed #2a2b38;">
      <span data-i18n-html="no_url_notice"></span>
    </section>

    <footer class="text-center text-xs text-gray-600 pt-2 pb-6 space-y-1">
      <p data-i18n="footer_line1"></p>
      <p data-i18n="footer_line2"></p>
    </footer>
  </main>

  <!-- Logs backdrop -->
  <div id="logs-backdrop" class="logs-backdrop fixed inset-0 z-40" style="background:rgba(0,0,0,0.55);" onclick="toggleLogsPanel()"></div>

  <!-- Logs side panel -->
  <aside id="logs-panel" class="logs-panel fixed top-0 right-0 bottom-0 z-50 flex flex-col shadow-2xl" style="width:min(520px, 100vw); background:#111218; border-left:1px solid #2a2b38;">
    <div class="flex items-center justify-between px-4 py-3 flex-none" style="border-bottom:1px solid #2a2b38;">
      <div class="flex items-center gap-2">
        <span class="text-sm font-bold text-white tracking-wide" data-i18n="logs_title"></span>
        <span id="logs-count" class="text-xs px-2 py-0.5 rounded font-mono" style="background:#2a2b38; color:#9ca3af;">0</span>
      </div>
      <button onclick="toggleLogsPanel()" class="w-7 h-7 rounded flex items-center justify-center transition-all hover:opacity-80" style="background:#1a1b23; border:1px solid #2a2b38; color:#9ca3af;" data-i18n-title="logs_close">✕</button>
    </div>

    <div class="px-4 py-3 flex-none space-y-3" style="border-bottom:1px solid #2a2b38; background:#0d0e14;">
      <label class="flex items-center justify-between gap-3 cursor-pointer">
        <span class="flex items-center gap-2 text-xs" style="color:#9ca3af;">
          <span class="w-1.5 h-1.5 rounded-full inline-block" id="logs-enable-dot" style="background:#4b5563;"></span>
          <span data-i18n="logs_enable_hint"></span>
        </span>
        <span class="toggle-switch">
          <input type="checkbox" id="logs-enabled-toggle" onchange="setLogsEnabled(this.checked)" />
          <span class="toggle-slider"></span>
        </span>
      </label>
      <div class="flex items-center gap-2 text-xs">
        <button onclick="fetchLogs()" class="px-2.5 py-1 rounded font-semibold transition-all hover:opacity-80" style="background:#1a1b23; border:1px solid #2a2b38; color:#9ca3af;" data-i18n="logs_refresh"></button>
        <button onclick="clearLogsServer()" class="px-2.5 py-1 rounded font-semibold transition-all hover:opacity-80" style="background:#1a1b23; border:1px solid #2a2b38; color:#9ca3af;" data-i18n="logs_clear"></button>
        <label class="flex items-center gap-1.5 ml-auto cursor-pointer" style="color:#9ca3af;">
          <input type="checkbox" id="logs-autorefresh" checked class="accent-purple-500" />
          <span data-i18n="logs_auto"></span>
        </label>
      </div>
    </div>

    <div id="logs-list" class="flex-1 overflow-auto"></div>

    <div class="flex-none px-4 py-2 text-xs" style="border-top:1px solid #2a2b38; color:#6b7280; background:#0d0e14;" data-i18n="logs_footer"></div>
  </aside>

      logs_cleared:      "✓ Логи очищены",

  // ============================================================
  // State
  // ============================================================
  const LS_URL    = 'rerouter_upstream';
  const LS_MODE   = 'rerouter_mode';
  const LS_BLOCKS = 'rerouter_blocks';
  const LS_LANG   = 'rerouter_lang';

  let lang = localStorage.getItem(LS_LANG) || 'en';

  let state = {
    upstream: localStorage.getItem(LS_URL)    || '',
    mode:     localStorage.getItem(LS_MODE)   || 'base',
    prependBlocks: [],
    appendBlocks:  [],
  };

  // ============================================================
  // i18n
  // ============================================================
  function t(key) { return T[lang][key] || T['en'][key] || key; }

  function applyTranslations() {
    document.querySelectorAll('[data-i18n]').forEach(el => {
      el.textContent = t(el.getAttribute('data-i18n'));
    });
    document.querySelectorAll('[data-i18n-html]').forEach(el => {
      el.innerHTML = t(el.getAttribute('data-i18n-html'));
    });
    document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
      el.placeholder = t(el.getAttribute('data-i18n-placeholder'));
    });
    // Lang buttons
    const btnEn = document.getElementById('lang-en');
    const btnRu = document.getElementById('lang-ru');
    if (btnEn && btnRu) {
      btnEn.style.background = lang === 'en' ? '#7c3aed' : 'transparent';
      btnEn.style.color      = lang === 'en' ? '#fff'    : '#9ca3af';
      btnRu.style.background = lang === 'ru' ? '#7c3aed' : 'transparent';
      btnRu.style.color      = lang === 'ru' ? '#fff'    : '#9ca3af';
    }
  }

  function setLang(l) {
    lang = l;
    localStorage.setItem(LS_LANG, l);
    applyTranslations();
    renderBlocks(); // re-render blocks (placeholders change)
  }

  // ============================================================
  // Base64url
  // ============================================================
  function b64encode(str) {
    return btoa(unescape(encodeURIComponent(str)))
      .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
  }

  // ============================================================
  // Upstream URL
  // ============================================================
  function saveAndRefresh() {
    const val = document.getElementById('upstream-url').value.trim();
    state.upstream = val;
    localStorage.setItem(LS_URL, val);
    refresh();
  }

  // ============================================================
  // Mode
  // ============================================================
  function setMode(mode) {
    state.mode = mode;
    localStorage.setItem(LS_MODE, mode);
    refresh();
  }

  // ============================================================
  // Blocks
  // ============================================================
  // Migration: older versions stored a flat array; new structure keeps
  // prepend and append in separate arrays so each Add lands at the
  // bottom of its own group.
  (function migrateBlocks() {
    const raw = JSON.parse(localStorage.getItem(LS_BLOCKS) || '[]');
    const flat = Array.isArray(raw) ? raw : [];
    if (flat.length > 0 && (flat[0].position === undefined || flat.some(b => typeof b !== 'object' || !b.position))) {
      state.prependBlocks = [];
      state.appendBlocks  = [];
    } else if (flat.length > 0 && Array.isArray(flat[0]?.prependBlocks)) {
      state.prependBlocks = flat[0].prependBlocks || [];
      state.appendBlocks  = flat[0].appendBlocks  || [];
    } else {
      state.prependBlocks = flat.filter(b => b.position === 'prepend');
      state.appendBlocks  = flat.filter(b => b.position === 'append');
    }
    for (const arr of [state.prependBlocks, state.appendBlocks]) {
      for (const b of arr) {
        if (typeof b.name !== 'string') b.name = '';
        if (!b.id) b.id = Date.now() + Math.random();
        delete b.position;  // legacy v1 field, redundant after split
      }
    }
  })();

  function saveBlocks() {
    localStorage.setItem(LS_BLOCKS, JSON.stringify([
      { prependBlocks: state.prependBlocks, appendBlocks: state.appendBlocks }
    ]));
  }

  function addBlock(position) {
    const block = { id: Date.now() + Math.random(), role: 'system', name: '', content: '' };
    if (position === 'prepend') state.prependBlocks.push(block);
    else                        state.appendBlocks.push(block);
    saveBlocks();
    renderBlocks();
    refreshUrls();
  }

  function removeBlock(group, id) {
    const arr = group === 'prepend' ? state.prependBlocks : state.appendBlocks;
    const idx = arr.findIndex(b => b.id === id);
    if (idx < 0) return;
    arr.splice(idx, 1);
    saveBlocks();
    renderBlocks();
    refreshUrls();
  }

  function moveBlock(group, id, dir) {
    const arr = group === 'prepend' ? state.prependBlocks : state.appendBlocks;
    const idx = arr.findIndex(b => b.id === id);
    if (idx < 0) return;
    const newIdx = idx + dir;
    if (newIdx < 0 || newIdx >= arr.length) return;
    [arr[idx], arr[newIdx]] = [arr[newIdx], arr[idx]];
    saveBlocks();
    renderBlocks();
    refreshUrls();
  }

  function updateBlock(group, id, field, value) {
    const arr = group === 'prepend' ? state.prependBlocks : state.appendBlocks;
    const b = arr.find(b => b.id === id);
    if (!b) return;
    b[field] = value;
    saveBlocks();
    refreshUrls();
    if (field === 'role') renderBlocks();  // role changes the border colour, re-render
  }

  function renderBlockCard(b, group, i, total) {
    const isPre  = group === 'prepend';
    const arrow  = isPre ? '↑' : '↓';
    const roleOpts = ['system','user','assistant'].map(r =>
      `<option value="${r}" ${b.role === r ? 'selected' : ''}>${r}</option>`
    ).join('');
    const role = (b.role || 'system');
    const nameEsc = (b.name || '').replace(/"/g, '&quot;');
    return `
      <div class="block-card rounded-xl p-3.5 space-y-2 role-${role} position-${group}">
        <div class="flex items-center gap-2">
          <span class="position-arrow" title="${isPre ? 'prepend' : 'append'}">${arrow}</span>
          <input
            type="text"
            placeholder="${t('pm_label_placeholder')}"
            value="${nameEsc}"
            oninput="updateBlock('${group}', ${b.id}, 'name', this.value)"
            class="flex-1 text-xs px-2 py-1 rounded text-gray-200 placeholder-gray-600 outline-none focus:ring-1"
            style="background:#111218; border:1px solid #2a2b38;"
          />
          <select
            class="text-xs px-2 py-1 rounded-lg text-white outline-none focus:ring-1"
            style="background:#111218; border:1px solid #2a2b38;"
            onchange="updateBlock('${group}', ${b.id}, 'role', this.value)"
          >${roleOpts}</select>
          <button onclick="moveBlock('${group}', ${b.id}, -1)" ${i === 0 ? 'disabled' : ''} class="w-7 h-7 rounded flex items-center justify-center disabled:opacity-20 transition-colors hover:text-white" style="background:#111218; color:#6b7280;">▲</button>
          <button onclick="moveBlock('${group}', ${b.id},  1)" ${i === total - 1 ? 'disabled' : ''} class="w-7 h-7 rounded flex items-center justify-center disabled:opacity-20 transition-colors hover:text-white" style="background:#111218; color:#6b7280;">▼</button>
          <button onclick="removeBlock('${group}', ${b.id})" class="w-7 h-7 rounded flex items-center justify-center transition-colors" style="background:#111218; color:#ef4444;">✕</button>
        </div>
        <textarea
          rows="4"
          placeholder="${t('pm_block_placeholder')}"
          class="w-full rounded-lg px-3 py-2.5 text-sm text-white placeholder-gray-600 outline-none focus:ring-2"
          style="background:#111218; border:1px solid #2a2b38;"
          oninput="updateBlock('${group}', ${b.id}, 'content', this.value)"
        >${(b.content || '').replace(/</g, '&lt;')}</textarea>
      </div>
    `;
  }

  function renderBlocks() {
    const preEl  = document.getElementById('blocks-prepend');
    const appEl  = document.getElementById('blocks-append');
    const empty  = document.getElementById('blocks-empty');
    if (!preEl || !appEl) return;

    const total = state.prependBlocks.length + state.appendBlocks.length;
    empty.classList.toggle('hidden', total > 0);

    preEl.innerHTML = state.prependBlocks
      .map((b, i) => renderBlockCard(b, 'prepend', i, state.prependBlocks.length))
      .join('');
    appEl.innerHTML = state.appendBlocks
      .map((b, i) => renderBlockCard(b, 'append', i, state.appendBlocks.length))
      .join('');
  }

  // ============================================================
  // URL Generation
  // ============================================================
  const LS_LOGS_ENABLED = 'rerouter_logs_enabled';
  state.logsEnabled = localStorage.getItem(LS_LOGS_ENABLED) === '1';
  state.logs = [];
  state.logsPanelOpen = false;
  state.expandedLogs = new Set();
  let logsTimer = null;

  function setLogsEnabled(on) {
    state.logsEnabled = !!on;
    localStorage.setItem(LS_LOGS_ENABLED, state.logsEnabled ? '1' : '0');
    const btnDot = document.getElementById('logs-btn-dot');
    const enDot  = document.getElementById('logs-enable-dot');
    const color  = state.logsEnabled ? '#4ade80' : '#4b5563';
    if (btnDot) btnDot.style.background = color;
    if (enDot)  enDot.style.background  = color;
    refreshUrls();
  }

  function toggleLogsPanel() {
    const panel    = document.getElementById('logs-panel');
    const backdrop = document.getElementById('logs-backdrop');
    if (!panel) return;
    const isOpen = panel.classList.contains('open');
    if (isOpen) {
      panel.classList.remove('open');
      backdrop.classList.remove('open');
      state.logsPanelOpen = false;
      stopLogsAutoRefresh();
    } else {
      panel.classList.add('open');
      backdrop.classList.add('open');
      state.logsPanelOpen = true;
      fetchLogs();
      startLogsAutoRefresh();
    }
  }

  function startLogsAutoRefresh() {
    stopLogsAutoRefresh();
    const cb = document.getElementById('logs-autorefresh');
    if (cb && cb.checked) {
      logsTimer = setInterval(() => { if (state.logsPanelOpen) fetchLogs(); }, 2000);
    }
  }
  function stopLogsAutoRefresh() {
    if (logsTimer) { clearInterval(logsTimer); logsTimer = null; }
  }

  async function fetchLogs() {
    try {
      const res  = await fetch('/api/logs', { cache: 'no-store' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      state.logs = data.logs || [];
      updateLogsCount();
      renderLogs();
    } catch (e) {
      // silent
    }
  }

  async function clearLogsServer() {
    try {
      const res = await fetch('/api/logs', { method: 'DELETE' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      state.logs = [];
      state.expandedLogs.clear();
      updateLogsCount();
      renderLogs();
      showToast(t('logs_cleared'));
    } catch (e) {
      showToast(t('toast_error'), true);
    }
  }

  function updateLogsCount() {
    const n = state.logs.length;
    const cnt = document.getElementById('logs-count');
    const btnCnt = document.getElementById('logs-btn-count');
    if (cnt) cnt.textContent = n;
    if (btnCnt) {
      if (n > 0) { btnCnt.textContent = n; btnCnt.style.display = ''; }
      else       { btnCnt.style.display = 'none'; }
    }
  }

  function methodColor(m) {
    return ({
      GET:    'background:#1e3a5f;color:#93c5fd;',
      POST:   'background:#14532d;color:#86efac;',
      PUT:    'background:#78350f;color:#fcd34d;',
      DELETE: 'background:#7f1d1d;color:#fca5a5;',
      PATCH:  'background:#3b1f5e;color:#c4b5fd;',
      OPTIONS:'background:#374151;color:#9ca3af;',
    })[m] || 'background:#374151;color:#9ca3af;';
  }

  function statusColor(s) {
    if (s >= 200 && s < 300) return 'background:#14532d;color:#86efac;';
    if (s >= 300 && s < 400) return 'background:#78350f;color:#fcd34d;';
    if (s >= 400 && s < 500) return 'background:#7f1d1d;color:#fca5a5;';
    if (s >= 500)            return 'background:#7f1d1d;color:#fecaca;';
    return 'background:#374151;color:#9ca3af;';
  }

  function escapeHtml(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#039;');
  }

  function formatBody(parsed, raw) {
    if (parsed !== null && parsed !== undefined) {
      try { return JSON.stringify(parsed, null, 2); } catch (e) {}
    }
    if (raw) return raw;
    return '(empty)';
  }

  function renderLogs() {
    const list = document.getElementById('logs-list');
    if (!list) return;
    if (!state.logs || state.logs.length === 0) {
      list.innerHTML = '<div class="logs-empty">' + escapeHtml(t('logs_empty')) + '</div>';
      return;
    }
    const sorted = state.logs.map((e, idx) => ({ e, idx })).reverse();
    list.innerHTML = sorted.map(({ e, idx }) => {
      const m   = (e.method || 'GET').toUpperCase();
      const s   = e.status;
      const path = e.path || '/';
      const dur = e.durationMs != null ? (e.durationMs + 'ms') : '...';
      const time = (() => { try { return new Date(e.timestamp).toLocaleTimeString(); } catch (_) { return ''; } })();
      const streamBadge = e.isStream
        ? '<span style="background:#0e7490;color:#67e8f9;font-family:monospace;font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;">STREAM</span>'
        : '';
      const errBadge = e.error
        ? '<span style="background:#7f1d1d;color:#fecaca;font-family:monospace;font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;">ERR</span>'
        : '';
      const bytes = e.bytesReceived != null ? (e.bytesReceived + 'B') : '';
      const chunks = e.chunksCount > 0 ? (e.chunksCount + ' chunks') : '';
      const expanded = state.expandedLogs.has(idx);
      const idAttr = `log-${idx}`;
      const hiddenClass = expanded ? '' : 'hidden';
      return `
        <div class="logs-row" data-idx="${idx}">
          <button class="w-full text-left p-3 flex flex-col gap-1.5" onclick="toggleLogDetail('${idAttr}')">
            <div class="flex items-center gap-2 flex-wrap">
              <span style="${methodColor(m)}font-family:monospace;font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;">${escapeHtml(m)}</span>
              <span style="${statusColor(s)}font-family:monospace;font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;">${s != null ? s : '...'}</span>
              ${streamBadge}
              ${errBadge}
              <span class="font-mono text-xs truncate" style="color:#d1d5db;max-width:240px;">${escapeHtml(path)}</span>
              <span class="ml-auto font-mono text-xs" style="color:#6b7280;">${escapeHtml(dur)}</span>
            </div>
            <div class="flex items-center gap-3 text-xs font-mono" style="color:#6b7280;">
              <span>${escapeHtml(time)}</span>
              ${bytes  ? `<span>${escapeHtml(bytes)}</span>` : ''}
              ${chunks ? `<span>${escapeHtml(chunks)}</span>` : ''}
            </div>
          </button>
          <div class="logs-detail ${hiddenClass}" id="log-detail-${idAttr}">
            <div class="p-3 space-y-3">
              ${e.error ? `<div class="logs-error-banner">${escapeHtml(e.error)}</div>` : ''}
              <div>
                <div class="text-xs font-semibold uppercase tracking-wider mb-1" style="color:#6b7280;">Request Headers</div>
                <div class="logs-json">${escapeHtml(JSON.stringify(e.requestHeaders || {}, null, 2))}</div>
              </div>
              <div>
                <div class="text-xs font-semibold uppercase tracking-wider mb-1" style="color:#6b7280;">Request Body${e.requestBodyTruncated ? ' (truncated)' : ''}</div>
                <div class="logs-json">${escapeHtml(formatBody(e.requestBody, e.requestBodyRaw))}</div>
              </div>
              <div>
                <div class="text-xs font-semibold uppercase tracking-wider mb-1" style="color:#6b7280;">Response Headers</div>
                <div class="logs-json">${escapeHtml(JSON.stringify(e.responseHeaders || {}, null, 2))}</div>
              </div>
              <div>
                <div class="text-xs font-semibold uppercase tracking-wider mb-1" style="color:#6b7280;">Response Body${e.responseBodyTruncated ? ' (truncated)' : ''}</div>
                <div class="logs-json">${escapeHtml(formatBody(e.responseBody, e.responseBodyRaw))}</div>
              </div>
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  function toggleLogDetail(idAttr) {
    const m = idAttr.match(/^log-(\d+)$/);
    if (!m) return;
    const idx = parseInt(m[1], 10);
    const el = document.getElementById('log-detail-' + idAttr);
    if (!el) return;
    const willExpand = el.classList.contains('hidden');
    el.classList.toggle('hidden');
    if (willExpand) state.expandedLogs.add(idx);
    else            state.expandedLogs.delete(idx);
  }

  function buildConfig() {
    if (state.mode === 'base') return { mode: 'base' };
    const mapBlock = b => {
      const out = { role: b.role, content: b.content };
      if (b.name && b.name.trim()) out.name = b.name.trim();
      return out;
    };
    return {
      mode: 'full',
      prepend_blocks: state.prependBlocks.map(mapBlock),
      append_blocks:  state.appendBlocks.map(mapBlock),
    };
  }

  function refreshUrls() {
    const section = document.getElementById('urls-section');
    const notice  = document.getElementById('no-url-notice');
    if (!state.upstream) {
      section.classList.add('hidden');
      notice.classList.remove('hidden');
      return;
    }
    section.classList.remove('hidden');
    notice.classList.add('hidden');
    const base = window.location.origin;
    const t_   = b64encode(state.upstream);
    const c    = b64encode(JSON.stringify(buildConfig()));
    const log  = state.logsEnabled ? '&log=1' : '';
    document.getElementById('url-janitor').textContent = `${base}/janitorai?t=${t_}&c=${c}${log}`;
    document.getElementById('url-silly').textContent   = `${base}/sillytavern?t=${t_}&c=${c}${log}`;
  }

  // ============================================================
  // Copy button
  // ============================================================
  function copyUrl(elId, btn) {
    const text = document.getElementById(elId).textContent;
    navigator.clipboard.writeText(text).then(() => {
      const orig = btn.textContent;
      btn.textContent = t('copy_done');
      btn.style.background = '#14532d';
      setTimeout(() => { btn.textContent = orig; btn.style.background = '#2a2b38'; }, 1500);
    });
  }

  // ============================================================
  // Export / Import
  // ============================================================
  function exportConfig() {
    const payload = {
      version: 2,
      exported_at: new Date().toISOString(),
      upstream: state.upstream,
      mode: state.mode,
      prependBlocks: state.prependBlocks,
      appendBlocks:  state.appendBlocks,
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = 'rerouter-config.json'; a.click();
    URL.revokeObjectURL(url);
  }

  function importConfig() {
    document.getElementById('import-file-input').value = '';
    document.getElementById('import-file-input').click();
  }

  function handleImportFile(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = JSON.parse(e.target.result);
        if (typeof data !== 'object' || data === null) throw new Error();
        if (typeof data.upstream === 'string') { state.upstream = data.upstream; localStorage.setItem(LS_URL, state.upstream); }
        if (data.mode === 'base' || data.mode === 'full') { state.mode = data.mode; localStorage.setItem(LS_MODE, state.mode); }

        // v2 format: separate prependBlocks/appendBlocks
        if (Array.isArray(data.prependBlocks) || Array.isArray(data.appendBlocks)) {
          state.prependBlocks = (data.prependBlocks || []).map(normalizeBlock);
          state.appendBlocks  = (data.appendBlocks  || []).map(normalizeBlock);
        }
        // v1 format: flat blocks array with position
        else if (Array.isArray(data.blocks)) {
          state.prependBlocks = data.blocks.filter(b => b.position === 'prepend').map(normalizeBlock);
          state.appendBlocks  = data.blocks.filter(b => b.position === 'append').map(normalizeBlock);
        }
        saveBlocks();
        refresh();
        showToast(t('toast_imported'));
      } catch { showToast(t('toast_error'), true); }
    };
    reader.readAsText(file);
  }

  function normalizeBlock(b) {
    return {
      id:      b.id || Date.now() + Math.random(),
      role:    ['system','user','assistant'].includes(b.role) ? b.role : 'system',
      name:    typeof b.name === 'string' ? b.name : '',
      content: typeof b.content === 'string' ? b.content : '',
    };
  }

  function showToast(msg, isError = false) {
    const ex = document.getElementById('toast');
    if (ex) ex.remove();
    const el = document.createElement('div');
    el.id = 'toast';
    el.textContent = msg;
    el.style.cssText = `position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:8px;font-size:13px;font-family:monospace;color:#fff;z-index:9999;transition:opacity .3s;background:${isError?'#7f1d1d':'#14532d'};border:1px solid ${isError?'#991b1b':'#166534'};`;
    document.body.appendChild(el);
    setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 2500);
  }

  // ============================================================
  // Main refresh
  // ============================================================
  function refresh() {
    document.getElementById('upstream-url').value = state.upstream;
    applyTranslations();

    const btnBase  = document.getElementById('tab-base');
    const btnFull  = document.getElementById('tab-full');
    const descBase = document.getElementById('desc-base');
    const descFull = document.getElementById('desc-full');
    const pm       = document.getElementById('prompt-manager');

    if (state.mode === 'base') {
      btnBase.style.background = '#7c3aed'; btnBase.style.color = '#fff'; btnBase.style.borderColor = 'transparent';
      btnFull.style.background = 'transparent'; btnFull.style.color = '#9ca3af'; btnFull.style.borderColor = '#2a2b38';
      descBase.classList.remove('hidden'); descFull.classList.add('hidden');
      pm.classList.add('hidden');
    } else {
      btnFull.style.background = '#7c3aed'; btnFull.style.color = '#fff'; btnFull.style.borderColor = 'transparent';
      btnBase.style.background = 'transparent'; btnBase.style.color = '#9ca3af'; btnBase.style.borderColor = '#2a2b38';
      descFull.classList.remove('hidden'); descBase.classList.add('hidden');
      pm.classList.remove('hidden');
      pm.classList.add('fade-in');
      renderBlocks();
    }

    refreshUrls();
  }

  // ============================================================
  // Init
  // ============================================================
  document.addEventListener('DOMContentLoaded', () => {
    refresh();
    document.getElementById('upstream-url').addEventListener('keydown', e => {
      if (e.key === 'Enter') saveAndRefresh();
    });
    const tgl = document.getElementById('logs-enabled-toggle');
    if (tgl) tgl.checked = state.logsEnabled;
    setLogsEnabled(state.logsEnabled);
    updateLogsCount();
  });
  </script>
</body>
</html>
